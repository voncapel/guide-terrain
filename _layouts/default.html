{% assign page_lang = page.lang | default: site.lang | default: 'fr' %}
{% assign locale = site.languages[page_lang] %}
<!DOCTYPE html>
<html lang="{{ page_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: locale.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: locale.description | default: site.description }}">
  {% if page.alternate_url %}
  <link rel="alternate" hreflang="{{ page.alternate_lang | default: 'en' }}" href="{{ page.alternate_url | absolute_url }}">
  <link rel="alternate" hreflang="{{ page_lang }}" href="{{ page.url | absolute_url }}">
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 
                        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  {% seo %}
</head>
<body class="{% if page.url contains '/outils/' %}page-outils{% else %}page-guide{% endif %}">
  {% include header.html %}
  <div class="site-wrapper">
    {{ content }}
  </div>
  {% include footer.html %}
  <script src="{{ '/assets/js/guide.js' | relative_url }}" defer></script>
</body>
</html>
